<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
    <title>Quan tri bac si</title>
</head>
<body>
<section layout:fragment="content" class="page-card" style="padding:28px;">
    <style>
        .admin-toolbar {
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:16px;
            flex-wrap:wrap;
            margin-bottom:24px;
        }

        .admin-title h1 {
            margin:0;
            font-family:"Literata", serif;
            font-size:2rem;
        }

        .admin-title p {
            margin:8px 0 0;
            color:var(--muted);
        }

        .admin-button {
            display:inline-flex;
            align-items:center;
            justify-content:center;
            gap:8px;
            padding:12px 18px;
            border-radius:999px;
            border:none;
            background:linear-gradient(135deg, #0f766e, #14b8a6);
            color:#fff;
            font-weight:700;
            box-shadow:0 18px 28px rgba(15,118,110,0.18);
            cursor:pointer;
        }

        .admin-table-wrap {
            overflow:auto;
            border:1px solid rgba(15,118,110,0.12);
            border-radius:24px;
            background:#fff;
        }

        .admin-table {
            width:100%;
            border-collapse:collapse;
            min-width:820px;
        }

        .admin-table th,
        .admin-table td {
            padding:18px 16px;
            text-align:left;
            border-bottom:1px solid rgba(15,118,110,0.08);
            vertical-align:middle;
        }

        .admin-table th {
            background:#f2fbf9;
            color:#315565;
            font-size:0.9rem;
            text-transform:uppercase;
            letter-spacing:0.04em;
        }

        .doctor-summary {
            display:flex;
            align-items:center;
            gap:14px;
        }

        .doctor-thumb {
            width:64px;
            height:64px;
            border-radius:18px;
            object-fit:cover;
            background:#eef8f5;
            border:1px solid rgba(15,118,110,0.1);
        }

        .doctor-summary strong {
            display:block;
            margin-bottom:4px;
        }

        .doctor-summary span {
            color:var(--muted);
            font-size:0.95rem;
        }

        .department-chip {
            display:inline-flex;
            padding:8px 12px;
            border-radius:999px;
            background:#eef8f5;
            color:#0f766e;
            font-weight:700;
            font-size:0.9rem;
        }

        .action-group {
            display:flex;
            gap:10px;
            flex-wrap:wrap;
        }

        .action-link,
        .action-button {
            display:inline-flex;
            align-items:center;
            justify-content:center;
            min-width:92px;
            padding:10px 14px;
            border-radius:999px;
            font-weight:700;
            border:1px solid rgba(15,118,110,0.12);
            background:#fff;
            color:#315565;
            cursor:pointer;
        }

        .action-link {
            color:#0f766e;
        }

        .action-button.danger {
            color:#b42318;
            border-color:rgba(180,35,24,0.14);
            background:#fff4f2;
        }

        .empty-admin {
            text-align:center;
            padding:42px 20px;
            color:var(--muted);
        }

        @media (max-width:768px) {
            .admin-toolbar {
                align-items:flex-start;
            }
        }
    </style>

    <div class="admin-toolbar">
        <div class="admin-title">
            <h1>CRUD Bac Si</h1>
            <p>Khu vuc danh cho ADMIN de them, sua va xoa bac si trong he thong.</p>
        </div>
        <a th:href="@{/admin/doctors/add}" class="admin-button">+ Them bac si</a>
    </div>

    <div class="admin-table-wrap" th:if="${!#lists.isEmpty(doctors)}">
        <table class="admin-table">
            <thead>
            <tr>
                <th>Bac si</th>
                <th>Chuyen khoa</th>
                <th>Khoa</th>
                <th>Thao tac</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="doctor : ${doctors}">
                <td>
                    <div class="doctor-summary">
                        <img class="doctor-thumb" th:src="${doctor.image}" th:alt="${doctor.name}">
                        <div>
                            <strong th:text="${doctor.name}">BS. Nguyen Minh Anh</strong>
                            <span th:text="|ID: ${doctor.id}|">ID: 1</span>
                        </div>
                    </div>
                </td>
                <td th:text="${doctor.specialty}">Tim mach</td>
                <td><span class="department-chip" th:text="${doctor.department.name}">Khoa Noi</span></td>
                <td>
                    <div class="action-group">
                        <a class="action-link" th:href="@{/admin/doctors/edit/{id}(id=${doctor.id})}">Sua</a>
                        <form th:action="@{/admin/doctors/delete/{id}(id=${doctor.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="action-button danger" onclick="return confirm('Ban chac chan muon xoa bac si nay?');">Xoa</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="empty-admin" th:if="${#lists.isEmpty(doctors)}">
        Chua co bac si nao trong he thong. Hay them bac si dau tien cho phong kham.
    </div>
</section>
</body>
</html>
